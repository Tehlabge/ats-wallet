# ATS Wallet — только Backend (Go API)
# В Coolify: отдельный ресурс. DB_HOST задайте в Environment (хост Postgres из приложения «БД»).

services:
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "4000"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-wallet}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-wallet}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:-ats-wallet-secret-key}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-ats-admin-secret}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-}
      TRONGRID_API_KEY: ${TRONGRID_API_KEY:-}
      WALLET_PASSWORD: ${WALLET_PASSWORD:-}
      SUPPORT_BOT_TOKEN: ${SUPPORT_BOT_TOKEN:-}
      SUPPORT_GROUP_ID: ${SUPPORT_GROUP_ID:--1003782777869}
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
