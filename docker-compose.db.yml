# ATS Wallet — только БД (PostgreSQL)
# В Coolify: один ресурс с этим compose. Порты на хост не публикуем.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wallet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-walletpass}
      POSTGRES_DB: ${POSTGRES_DB:-wallet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallet} -d ${POSTGRES_DB:-wallet}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
